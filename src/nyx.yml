$schema: vscode://schemas/color-theme
name: Nyx
author: Lars Heule
maintainers:
  - Lars Heule <Hic20@pm.me>
semanticClass: nyx.theme
semanticHighlighting: true
nyx:
  base:
    - &BG         '#121122'
    - &FG         '#F8F8F2' # nc
    - &SELECTION  '#44475A' # nc
    - &COMMENT    '#565095'
    - &CYAN       '#8BE9FD' # nc
    - &GREEN      '#50FA7B' # nc
    - &ORANGE     '#FFB86C' # nc
    - &PINK       '#FF79C6' # nc
    - &PURPLE     '#BD93F9' # nc
    - &RED        '#FF5555' # nc
    - &YELLOW     '#F1FA8C' # nc
  ansi:
    - &COLOR0     '#21222C' # nc
    - &COLOR1     '#FF5555' # nc
    - &COLOR2     '#50FA7B' # nc
    - &COLOR3     '#F1FA8C' # nc
    - &COLOR4     '#BD93F9' # nc
    - &COLOR5     '#FF79C6' # nc
    - &COLOR6     '#8BE9FD' # nc
    - &COLOR7     '#F8F8F2' # nc
    - &COLOR8     '#6272A4' # nc
    - &COLOR9     '#FF6E6E' # nc
    - &COLOR10    '#69FF94' # nc
    - &COLOR11    '#FFFFA5' # nc
    - &COLOR12    '#D6ACFF' # nc
    - &COLOR13    '#FF92DF' # nc
    - &COLOR14    '#A4FFFF' # nc
    - &COLOR15    '#FFFFFF' # nc
  brightOther:
    # Temporary (awaiting fix)
    - &TEMP_QUOTES          '#E9F284' # nc
    - &TEMP_PROPERTY_QUOTES '#8BE9FE' # nc
  other:
    - &LineHighlight  '#44475A75' # nc
    - &NonText        '#FFFFFF1A' # nc
    - &WHITE          '#FFFFFF'
    - &TAB_DROP_BG    '#44475A70' # nc
    # UI Variants
    - &BGLighter     '#424450'  # nc
    - &BGLight       '#343746'  # nc
    - &BGDark        '#21222C'  # nc
    - &BGDarker      '#191A21'  # nc

# User Interface (Reference: https://code.visualstudio.com/docs/getstarted/theme-color-reference)
colors:
  # Integrated Terminal Colors
  terminal.background: *BG
  terminal.foreground: *FG
  terminal.ansiBrightBlack: *COLOR8
  terminal.ansiBrightRed: *COLOR9
  terminal.ansiBrightGreen: *COLOR10
  terminal.ansiBrightYellow: *COLOR11
  terminal.ansiBrightBlue: *COLOR12
  terminal.ansiBrightMagenta: *COLOR13
  terminal.ansiBrightCyan: *COLOR14
  terminal.ansiBrightWhite: *COLOR15
  terminal.ansiBlack: *COLOR0
  terminal.ansiRed: *COLOR1
  terminal.ansiGreen: *COLOR2
  terminal.ansiYellow: *COLOR3
  terminal.ansiBlue: *COLOR4
  terminal.ansiMagenta: *COLOR5
  terminal.ansiCyan: *COLOR6
  terminal.ansiWhite: *COLOR7

  # Contrast Colors
  contrastBorder:                       # An extra border around elements to separate them from others for greater contrast
  contrastActiveBorder:                 # An extra border around active elements to separate from others for greater contrast

  # Base Colors
  focusBorder: *COMMENT                 # Overall border color for focused elements. This color is only used if not overridden by a component
  foreground: *FG                       # Overall foreground color. This color is only used if not overridden by a component
  widget.shadow:                        # Shadow color of widgets such as Find/Replace inside the editor
  selection.background: *PURPLE         # Background color of text selections in the workbench
  errorForeground: *RED                 # Overall foreground color for error messages

  # Button Control
  button.background: *SELECTION         # Button background color
  button.foreground: *FG                # Button foreground color
  button.border:                        # Button border color
  button.hoverBackground:               # Button background color when hovering

  # Dropdown Control
  dropdown.background: *BGLight
  dropdown.border: *BGDarker
  dropdown.foreground: *FG

  # Input Control
  input.background: *BG
  input.foreground: *FG
  input.border: *BGDarker
  input.placeholderForeground: *PURPLE
  inputOption.activeBorder: *COMMENT
  inputValidation.infoForeground:
  inputValidation.infoBackground:
  inputValidation.infoBorder: *PINK
  inputValidation.warningForeground:
  inputValidation.warningBackground:
  inputValidation.warningBorder: *ORANGE
  inputValidation.errorForeground:
  inputValidation.errorBackground:
  inputValidation.errorBorder: *RED

  # Scroll Bar Control
  scrollbar.shadow:
  scrollbarSlider.activeBackground:
  scrollbarSlider.background:
  scrollbarSlider.hoverBackground:

  # Badge
  badge.foreground: *FG
  badge.background: *SELECTION

  # Progress Bar
  progressBar.background: *PINK

  # List & Trees
  list.activeSelectionBackground: *SELECTION
  list.activeSelectionForeground: *FG
  list.dropBackground: *SELECTION
  list.focusBackground: *LineHighlight
  list.highlightForeground: *CYAN
  list.hoverBackground: *LineHighlight
  list.inactiveSelectionBackground: *LineHighlight
  list.inactiveSelectionForeground:
  list.warningForeground: *ORANGE
  list.errorForeground: *RED
  list.hoverForeground:
  list.focusForeground:

  # Activity Bar
  activityBar.background: *BGLight
  activityBar.inactiveForeground: *COMMENT
  activityBar.dropBackground:
  activityBar.foreground: *FG
  activityBar.border:
  activityBar.activeBorder: !alpha [*PINK, 80]
  activityBar.activeBackground: !alpha [*PURPLE, 10]
  activityBarBadge.background: *PINK
  activityBarBadge.foreground: *FG

  # Side Bar
  sideBar.background: *BGDark
  sideBar.foreground:
  sideBar.border:
  sideBarTitle.foreground: *FG
  sideBarSectionHeader.background: *BG
  sideBarSectionHeader.foreground:
  sideBarSectionHeader.border: *BGDarker

  # Editor Group & Tabs
  editorGroup.background:
  editorGroup.border: *PURPLE
  editorGroup.dropBackground: *TAB_DROP_BG
  editorGroupHeader.noTabsBackground:
  editorGroupHeader.tabsBackground: *BGDarker
  editorGroupHeader.tabsBorder:
  tab.activeBackground: *BG
  tab.activeForeground: *FG
  tab.border: *BGDarker
  tab.activeBorderTop: !alpha [*PINK, 80]
  tab.activeBorder:
  tab.unfocusedActiveBorder:
  tab.inactiveBackground: *BGDark
  tab.inactiveForeground: *COMMENT
  tab.unfocusedActiveForeground:
  tab.unfocusedInactiveForeground:

  # Editor Colors
  editor.background: *BG
  editorLineNumber.foreground: *COMMENT
  editorCursor.foreground:

  editor.selectionBackground: *SELECTION
  editor.selectionHighlightBackground: *BGLighter
  editor.inactiveSelectionBackground:
  editor.foldBackground: !alpha [*BGDark, 50]

  editor.wordHighlightBackground: !alpha [*CYAN, 50]
  editor.wordHighlightStrongBackground: !alpha [*GREEN, 50]

  editor.findMatchBackground: !alpha [*ORANGE, 80]
  editor.findMatchHighlightBackground: !alpha [*WHITE, 40]
  editor.findRangeHighlightBackground: *LineHighlight

  editor.hoverHighlightBackground: !alpha [*CYAN, 50]

  editor.lineHighlightBackground:
  editor.lineHighlightBorder: *SELECTION

  editorLink.activeForeground: *CYAN
  editor.rangeHighlightBackground: !alpha [*PURPLE, 15]

  editor.snippetTabstopHighlightBackground: *BG
  editor.snippetTabstopHighlightBorder: *COMMENT
  editor.snippetFinalTabstopHighlightBackground: *BG
  editor.snippetFinalTabstopHighlightBorder: *GREEN

  editorWhitespace.foreground: *NonText
  editorIndentGuide.background: *NonText
  editorIndentGuide.activeBackground: !alpha [*WHITE, 45]
  editorRuler.foreground: *NonText

  editorCodeLens.foreground: *COMMENT

  editorBracketMatch.background:
  editorBracketMatch.border:

  editorBracketHighlight.foreground1: *FG
  editorBracketHighlight.foreground2: *PINK
  editorBracketHighlight.foreground3: *CYAN
  editorBracketHighlight.foreground4: *GREEN
  editorBracketHighlight.foreground5: *PURPLE
  editorBracketHighlight.foreground6: *ORANGE
  editorBracketHighlight.unexpectedBracket.foreground: *RED

  editorOverviewRuler.border: *BGDarker
  editorOverviewRuler.findMatchForeground:
  editorOverviewRuler.rangeHighlightForeground:
  editorOverviewRuler.selectionHighlightForeground: *ORANGE
  editorOverviewRuler.wordHighlightForeground: *CYAN
  editorOverviewRuler.wordHighlightStrongForeground: *GREEN
  editorOverviewRuler.modifiedForeground: !alpha [*CYAN, 80]
  editorOverviewRuler.addedForeground: !alpha [*GREEN, 80]
  editorOverviewRuler.deletedForeground: !alpha [*RED, 80]
  editorOverviewRuler.errorForeground: !alpha [*RED, 80]
  editorOverviewRuler.warningForeground: !alpha [*ORANGE, 80]
  editorOverviewRuler.infoForeground: !alpha [*CYAN, 80]

  editorError.foreground: *RED
  editorError.border:
  editorWarning.foreground: *CYAN
  editorWarning.border:

  editorGutter.background:
  editorGutter.modifiedBackground: !alpha [*CYAN, 80]
  editorGutter.addedBackground: !alpha [*GREEN, 80]
  editorGutter.deletedBackground: !alpha [*RED, 80]

  # Explorer Colors
  gitDecoration.modifiedResourceForeground: *CYAN
  gitDecoration.deletedResourceForeground: *RED
  gitDecoration.untrackedResourceForeground: *GREEN
  gitDecoration.ignoredResourceForeground: *COMMENT
  gitDecoration.conflictingResourceForeground: *ORANGE

  # Diff Editor Colors
  diffEditor.insertedTextBackground: !alpha [*GREEN, 20]
  diffEditor.insertedTextBorder:
  diffEditor.removedTextBackground: !alpha [*RED, 50]
  diffEditor.removedTextBorder:
  inlineChat.regionHighlight: *BGLight

  # Editor Widget Colors
  editorWidget.background: *BGDark
  editorWidgetBorder:

  editorSuggestWidget.background: *BGDark
  editorSuggestWidget.border:
  editorSuggestWidget.foreground: *FG
  editorSuggestWidget.highlightForeground:
  editorSuggestWidget.selectedBackground: *SELECTION

  editorHoverWidget.background: *BG
  editorHoverWidget.border: *COMMENT

  debugExceptionWidget.background:
  debugExceptionWidget.border:

  editorMarkerNavigation.background: *BGDark
  editorMarkerNavigationError.background:
  editorMarkerNavigationWarning.background:

  # Peek View Colors
  peekView.border: *SELECTION
  peekViewEditor.background: *BG
  peekViewEditorGutter.background:
  peekViewEditor.matchHighlightBackground: !alpha [*YELLOW, 80]
  peekViewResult.background: *BGDark
  peekViewResult.fileForeground: *FG
  peekViewResult.lineForeground: *FG
  peekViewResult.matchHighlightBackground: !alpha [*YELLOW, 80]
  peekViewResult.selectionBackground: *SELECTION
  peekViewResult.selectionForeground: *FG
  peekViewTitle.background: *BGDarker
  peekViewTitleDescription.foreground: *COMMENT
  peekViewTitleLabel.foreground: *FG

  # Merge Conflicts
  merge.currentHeaderBackground: !alpha [*GREEN, 90]
  merge.currentContentBackground:
  merge.incomingHeaderBackground: !alpha [*PURPLE, 90]
  merge.incomingContentBackground:
  merge.border:
  editorOverviewRuler.currentContentForeground: *GREEN
  editorOverviewRuler.incomingContentForeground: *PURPLE

  # Panel Colors
  panel.background: *BG
  panel.border: *PURPLE
  panelTitle.activeBorder: *PINK
  panelTitle.activeForeground: *FG
  panelTitle.inactiveForeground: *COMMENT

  # Status Bar Colors
  statusBar.background: *BGDarker
  statusBar.foreground: *FG
  statusBar.debuggingBackground: *RED
  statusBar.debuggingForeground: *BGDarker
  statusBar.noFolderBackground: *BGDarker
  statusBar.noFolderForeground: *FG
  statusBarItem.activeBackground:
  statusBarItem.hoverBackground:
  statusBarItem.prominentBackground: *RED
  statusBarItem.prominentHoverBackground: *ORANGE
  statusBarItem.remoteForeground: *BG
  statusBarItem.remoteBackground: *PURPLE
  statusBar.borders:

  # Title Bar Colors (MacOS Only)
  titleBar.activeBackground: *BGDark
  titleBar.activeForeground: *FG
  titleBar.inactiveBackground: *BGDarker
  titleBar.inactiveForeground: *COMMENT

  # Extensions
  extensionButton.prominentForeground: *FG
  extensionButton.prominentBackground: !alpha [*GREEN, 90]
  extensionButton.prominentHoverBackground: !alpha [*GREEN, 60]

  # Quick Picker
  pickerGroup.border: *PURPLE
  pickerGroup.foreground: *CYAN

  # Debug
  debugToolBar.background: *BGDark

  # Welcome Page
  welcomePage.buttonBackground:
  welcomePage.buttonHoverBackground:
  welcomePage.embeddedEditorBackground: *BGDark

  # Setting Editor
  settings.headerForeground: *FG
  settings.modifiedItemIndicator: *ORANGE
  settings.inactiveSelectedItemBorder:
  settings.dropdownBackgroud: *BGDark
  settings.dropdownForeground: *FG
  settings.dropdownBorder: *BGDarker
  settings.checkboxBackground: *BGDark
  settings.checkboxForeground: *FG
  settings.checkboxBorder: *BGDarker
  settings.textInputBackground: *BGDark
  settings.textInputForeground: *FG
  settings.textInputBorder: *BGDarker
  settings.numberInputBackground: *BGDark
  settings.numberInputForeground: *FG
  settings.numberInputBorder: *BGDarker

  # Breadcrumbs
  breadcrumb.foreground: *COMMENT
  breadcrumb.background: *BG
  breadcrumb.focusForeground: *FG
  breadcrumb.activeSelectionForeground: *FG
  breadcrumbPicker.background: *BGDarker

  # Misc
  menu.seperatorBackground:
  listFilterWidget.background: *BGLight
  listFilterWidget.outline: *BGLighter
  listFilterWidget.noMatchesOutline: *RED

# Syntaxes
tokenColors:

# ==============================================================================
# General
# ==============================================================================

  - scope:
    - emphasis
    settings:
      fontStyle: italic
  - scope:
    - strong
    settings:
      fontStyle: bold
  - scope:
    - header
    settings:
      foreground: *PURPLE

  # Diffs
  # =====
  - scope:
    - meta.diff
    - meta.diff.header
    settings:
      foreground: *COMMENT
  - scope:
    - markup.inserted
    settings:
      foreground: *GREEN
  - scope:
    - markup.deleted
    settings:
      foreground: *RED
  - scope:
    - markup.changed
    settings:
      foreground: *ORANGE
  - scope:
    - invalid
    settings:
      foreground: *RED
      fontStyle: underline italic
  - scope:
    - invalid.deprecated
    settings:
      foreground: *FG
      fontStyle: underline italic
  - scope:
    - entity.name.filename
    settings:
      foreground: *YELLOW
  - scope:
    - markup.error
    settings:
      foreground: *RED

  # Markdown / RST / Prose
  # ======================
  - name: Underlined markup
    scope:
    - markup.underline
    settings:
      fontStyle: underline

  - name: Bold markup
    scope:
    - markup.bold
    settings:
      fontStyle: bold
      foreground: *ORANGE

  - name: Markup headings
    scope:
    - markup.heading
    settings:
      fontStyle: bold
      foreground: *PURPLE

  - name: Markup italic
    scope:
    - markup.italic
    settings:
      foreground: *YELLOW
      fontStyle: italic

  - name: Bullets, lists (prose)
    scope:
    - beginning.punctuation.definition.list.markdown
    - beginning.punctuation.definition.quote.markdown
    - punctuation.definition.link.restructuredtext
    settings:
      foreground: *CYAN

  - name: Inline code (prose)
    scope:
    - markup.inline.raw
    - markup.raw.restructuredtext
    settings:
      foreground: *GREEN

  - name: Links (prose)
    scope:
    - markup.underline.link
    - markup.underline.link.image
    settings:
      foreground: *CYAN

  - name: Link text, image alt text (prose)
    scope:
    - meta.link.reference.def.restructuredtext
    - punctuation.definition.directive.restructuredtext
    - string.other.link.description
    - string.other.link.title
    settings:
      foreground: *PINK

  - name: Blockquotes (prose)
    scope:
    - entity.name.directive.restructuredtext
    - markup.quote
    settings:
      foreground: *YELLOW
      fontStyle: italic

  - name: Horizontal rule (prose)
    scope:
    - meta.separator.markdown
    settings:
      foreground: *COMMENT

  - name: Code blocks
    scope:
    - fenced_code.block.language
    - markup.raw.inner.restructuredtext
    - markup.fenced_code.block.markdown punctuation.definition.markdown
    settings:
      foreground: *GREEN

  - name: Prose constants
    scope:
    - punctuation.definition.constant.restructuredtext
    settings:
      foreground: *PURPLE

  - name: Braces in markdown headings
    scope:
    - markup.heading.markdown punctuation.definition.string.begin
    - markup.heading.markdown punctuation.definition.string.end
    settings:
      foreground: *PURPLE

  - name: Braces in markdown paragraphs
    scope:
    - meta.paragraph.markdown punctuation.definition.string.begin
    - meta.paragraph.markdown punctuation.definition.string.end
    settings:
      foreground: *FG

  - name: Braces in markdown blockquotes
    scope:
    - markup.quote.markdown meta.paragraph.markdown punctuation.definition.string.begin
    - markup.quote.markdown meta.paragraph.markdown punctuation.definition.string.end
    settings:
      foreground: *YELLOW

# ==============================================================================
# Classes
# ==============================================================================

  - name: User-defined class names
    scope:
    - entity.name.type.class
    - entity.name.class
    settings:
      foreground: *CYAN
      fontStyle: normal

  - name: this, super, self, etc.
    scope:
    - keyword.expressions-and-types.swift
    - keyword.other.this
    - variable.language
    - variable.language punctuation.definition.variable.php
    - variable.other.readwrite.instance.ruby
    - variable.parameter.function.language.special
    settings:
      foreground: *PURPLE
      fontStyle: italic

  - name: Inherited classes
    scope:
    - entity.other.inherited-class
    settings:
      foreground: italic
      fontStyle: italic

# ==============================================================================
# Comments
# ==============================================================================

  - name: Comments
    scope:
    - comment
    - punctuation.definition.comment
    - unused.comment
    - wildcard.comment
    settings:
      foreground: *COMMENT

# ==============================================================================
# Constants
# ==============================================================================

  - name: Constants
    scope:
    - constant
    - variable.other.constant
    settings:
      foreground: *PURPLE

  - name: Constant escape sequences
    scope:
    - constant.character.escape
    - constant.character.string.escape
    - constant.group
    settings:
      foreground: *PINK

# ==============================================================================
# Functions/Methods
# ==============================================================================
  - name: Function names
    scope:
    - entity.name.function
    - meta.function-call.object
    - meta.function-call.php
    - meta.function-call.static
    - meta.method-call.java meta.method
    - meta.method.groovy
    - support.function.any-method.lua
    - keyword.operator.function.infix
    settings:
      foreground: *GREEN

  - name: Function parameters
    scope:
    - entity.name.variable.parameter
    - meta.at-rule.function variable
    - meta.at-rule.mixin variable
    - meta.function.arguments variable.other.php
    - meta.selectionset.graphql meta.arguments.graphql variable.arguments.graphql
    - variable.parameter
    settings:
      fontStyle: italic
      foreground: *ORANGE

  - name: Decorators
    scope:
    - meta.decorator variable.other.readwrite
    - meta.decorator variable.other.property
    settings:
      fontStyle: italic
      foreground: *GREEN

  - name: Decorator Objects
    scope:
      - meta.decorator variable.other.object
    settings:
      foreground: *GREEN

# =============================================================================
# Keywords
# =============================================================================

  - name: Keywords
    scope:
    - keyword
    - punctuation.definition.keyword
    settings:
      foreground: *PINK

  - name: Keyword "new"
    scope:
    - keyword.control.new
    - keyword.operator.new
    settings:
      fontStyle: bold

  - name: Generic selectors (CSS/SCSS/Less/Stylus)
    scope:
    - meta.selector
    settings:
      foreground: *PINK

# =============================================================================
# Language Built-ins
# =============================================================================

  - name: Language Built-ins
    scope:
    - support
    settings:
      fontStyle: italic
      foreground: *CYAN

  - name: Built-in magic functions and constants
    scope:
    - support.function.magic
    - support.variable
    - variable.other.predefined
    settings:
      fontStyle: regular
      foreground: *PURPLE

  - name: Built-in functions / properties
    scope:
    - support.function
    - support.type.property-name
    settings:
      fontStyle: regular

# =============================================================================
# Punctuation
# =============================================================================

  - name: Separators (key/value, namespace, inheritance, pointer, hash, slice, etc)
    scope:
    - constant.other.symbol.hashkey punctuation.definition.constant.ruby
    - entity.other.attribute-name.placeholder punctuation # Sass placeholder `%` symbols
    - entity.other.attribute-name.pseudo-class punctuation
    - entity.other.attribute-name.pseudo-element punctuation
    - meta.group.double.toml
    - meta.group.toml
    - meta.object-binding-pattern-variable punctuation.destructuring
    - punctuation.colon.graphql
    - punctuation.definition.block.scalar.folded.yaml
    - punctuation.definition.block.scalar.literal.yaml
    - punctuation.definition.block.sequence.item.yaml
    - punctuation.definition.entity.other.inherited-class
    - punctuation.function.swift
    - punctuation.separator.dictionary.key-value
    - punctuation.separator.hash
    - punctuation.separator.inheritance
    - punctuation.separator.key-value
    - punctuation.separator.key-value.mapping.yaml
    - punctuation.separator.namespace
    - punctuation.separator.pointer-access
    - punctuation.separator.slice
    - string.unquoted.heredoc punctuation.definition.string
    - support.other.chomping-indicator.yaml
    - punctuation.separator.annotation
    settings:
      foreground: *PINK

  - name: Brackets, braces, parens, etc.
    scope:
    - keyword.operator.other.powershell # Commas
    - keyword.other.statement-separator.powershell
    - meta.brace.round
    - meta.function-call punctuation
    - punctuation.definition.arguments.begin
    - punctuation.definition.arguments.end
    - punctuation.definition.entity.begin
    - punctuation.definition.entity.end
    - punctuation.definition.tag.cs # HTML tags in comments
    - punctuation.definition.type.begin
    - punctuation.definition.type.end
    - punctuation.section.scope.begin
    - punctuation.section.scope.end
    - punctuation.terminator.expression.php
    - storage.type.generic.java
    - string.template meta.brace
    - string.template punctuation.accessor
    settings:
      foreground: *FG

  - name: Variable interpolation operators
    scope:
    - meta.string-contents.quoted.double punctuation.definition.variable
    - punctuation.definition.interpolation.begin
    - punctuation.definition.interpolation.end
    - punctuation.definition.template-expression.begin
    - punctuation.definition.template-expression.end
    - punctuation.section.embedded.begin
    - punctuation.section.embedded.coffee
    - punctuation.section.embedded.end
    - punctuation.section.embedded.end source.php  # PHP edge case
    - punctuation.section.embedded.end source.ruby # Issue with ruby's tmLanguage
    - punctuation.definition.variable.makefile
    settings:
      foreground: *PINK

# =============================================================================
# Serializable / Config Languages
# =============================================================================

  - name: Keys (serializable languages)
    scope:
    - entity.name.function.target.makefile
    - entity.name.section.toml
    - entity.name.tag.yaml
    - variable.other.key.toml
    settings:
      foreground: *CYAN

  - name: Dates / timestamps (serializable languages)
    scope:
    - constant.other.date
    - constant.other.timestamp
    settings:
      foreground: *ORANGE

  - name: YAML aliases
    scope:
    - variable.other.alias.yaml
    settings:
      fontStyle: italic underline
      foreground: *GREEN

  - name: Types
    scope:
    - entity.name.type
    - keyword.primitive-datatypes.swift
    - keyword.type.cs
    - meta.protocol-list.objc
    - meta.return-type.objc
    - source.go storage.type
    - source.groovy storage.type
    - source.java storage.type
    - source.powershell entity.other.attribute-name
    - storage.class.std.rust
    - storage.type.attribute.swift
    - storage.type.c
    - storage.type.core.rust
    - storage.type.cs
    - storage.type.groovy
    - storage.type.objc
    - storage.type.php
    - storage.type.haskell
    - storage.type.ocaml
    settings:
      fontStyle: italic
      foreground: *CYAN

  - name: Generics, templates, and mapped type declarations
    scope:
    - entity.name.type.type-parameter
    - meta.indexer.mappedtype.declaration entity.name.type # Mapped type declarations
    - meta.type.parameters entity.name.type                # Generic type declarations
    settings:
      foreground: *ORANGE

  - name: Modifiers
    scope:
    - storage.modifier
    settings:
      foreground: *PINK

# =============================================================================
# RegExp
# =============================================================================

  - name: RegExp string
    scope:
    - string.regexp
    - constant.other.character-class.set.regexp
    - constant.character.escape.backslash.regexp
    settings:
      foreground: *YELLOW

  - name: Non-capture operators
    scope:
    # NOTE: The scope name is a misnomer. It is actually non-capture operators
    - punctuation.definition.group.capture.regexp
    settings:
      foreground: *PINK

  - name: RegExp start and end characters
    scope:
    - string.regexp punctuation.definition.string.begin
    - string.regexp punctuation.definition.string.end
    settings:
      foreground: *RED

  - name: Character group
    scope:
    - punctuation.definition.character-class.regexp
    settings:
      foreground: *CYAN

  - name: Capture groups
    scope:
    - punctuation.definition.group.regexp
    settings:
      foreground: *ORANGE

  - name: Assertion operators
    scope:
    - punctuation.definition.group.assertion.regexp
    - keyword.operator.negation.regexp
    settings:
      foreground: *RED

  - name: Positive lookaheads
    scope:
    - meta.assertion.look-ahead.regexp
    settings:
      foreground: *GREEN


# =============================================================================
# Strings
# =============================================================================

  - name: Strings
    scope:
    - string
    settings:
      foreground: *YELLOW

  - name: String quotes (temporary vscode fix)
    scope:
    # NOTE: This is a temporary fix for VSCode expand selection.
    # See (https://github.com/Microsoft/vscode/issues/4795)
    - punctuation.definition.string.begin
    - punctuation.definition.string.end
    settings:
      foreground: *TEMP_QUOTES

  - name: Property quotes (temporary vscode fix)
    scope:
    # NOTE: Same as above
    - punctuation.support.type.property-name.begin
    - punctuation.support.type.property-name.end
    settings:
      foreground: *TEMP_PROPERTY_QUOTES

  - name: Docstrings
    scope:
    - string.quoted.docstring.multi
    - string.quoted.docstring.multi.python punctuation.definition.string.begin
    - string.quoted.docstring.multi.python punctuation.definition.string.end
    - string.quoted.docstring.multi.python constant.character.escape
    settings:
      foreground: *COMMENT

# =============================================================================
# Variables
# =============================================================================

  - name: Variables and object properties
    scope:
    - variable
    - constant.other.key.perl     # Perl edge case
    - support.variable.property   # Object properties
    - variable.other.constant.js  # Fix incorrect highlighting of pseudo-constants in js, jsx
    - variable.other.constant.ts  # Fixes incorrect highlighting of pseudo-constants in ts
    - variable.other.constant.tsx # Fixes incorrect highlighting of pseudo-constants in tsx
    settings:
      foreground: *FG

  - name: Destructuring / aliasing reference name (LHS)
    scope:
    - meta.import variable.other.readwrite                          # Module import aliasing (real name)
    - meta.variable.assignment.destructured.object.coffee variable  # Object destructuring property (coffeescript)
    settings:
      fontStyle: italic
      foreground: *ORANGE

  - name: Destructuring / aliasing variable name (RHS)
    scope:
    - meta.import variable.other.readwrite.alias                             # Module import aliasing (alias name)
    - meta.export variable.other.readwrite.alias                             # Module import aliasing (alias name)
    - meta.variable.assignment.destructured.object.coffee variable variable  # Object destructuring variable (coffeescript)
    settings:
      fontStyle: normal
      foreground: *FG

# =============================================================================
# Language Extensions / Edge Cases
# =============================================================================

  # GraphQL
  # =======
  - name: GraphQL keys
    scope:
    - meta.selectionset.graphql variable
    settings:
      foreground: *YELLOW

  - name: GraphQL function arguments
    scope:
    - meta.selectionset.graphql meta.arguments variable
    settings:
      foreground: *FG

  - name: GraphQL fragment name (definition)
    scope:
    - entity.name.fragment.graphql
    - variable.fragment.graphql
    settings:
      foreground: *CYAN

  # Edge Cases
  # ==========
  - name: Edge cases (foreground color resets)
    scope:
    - constant.other.symbol.hashkey.ruby                            # Ruby hash keys
    - keyword.operator.dereference.java                             # Java dot access
    - keyword.operator.navigation.groovy                            # groovy dot access
    - meta.scope.for-loop.shell punctuation.definition.string.begin
    - meta.scope.for-loop.shell punctuation.definition.string.end
    - meta.scope.for-loop.shell string
    - storage.modifier.import                                       # Java / Groovy imports
    - punctuation.section.embedded.begin.tsx
    - punctuation.section.embedded.end.tsx
    - punctuation.section.embedded.begin.jsx
    - punctuation.section.embedded.end.jsx
    - punctuation.separator.list.comma.css                          # Commas separating selectors in CSS
    - constant.language.empty-list.haskell
    settings:
      foreground: *FG

  # This is set to conform to the standard of coloring langage constants purple.
  # In this case, this colors "$?", "$@", "$*", "$1", etc..
  - name: Shell variables prefixed with "$" (edge case)
    scope:
    - source.shell variable.other
    settings:
      foreground: *PURPLE

  - name: Powershell constants mistakenly scoped to `support`, rather than `constant` (edge)
    scope:
    - support.constant
    settings:
      fontStyle: normal
      foreground: *PURPLE

  - name: Makefile prerequisite names
    scope:
    - meta.scope.prerequisites.makefile
    settings:
      foreground: *YELLOW

  - name: SCSS attribute selector strings
    scope:
      - meta.attribute-selector.scss
    settings:
      foreground: *YELLOW

  - name: SCSS attribute selector brackets
    scope:
      - punctuation.definition.attribute-selector.end.bracket.square.scss
      - punctuation.definition.attribute-selector.begin.bracket.square.scss
    settings:
      foreground: *FG

  - name: Haskell Pragmas
    scope:
      - meta.preprocessor.haskell
    settings:
      foreground: *COMMENT

  - name: Log file error
    scope:
      - log.error
    settings:
      foreground: *RED
      fontStyle: bold

  - name: Log file warning
    scope:
      - log.warning
    settings:
      foreground: *YELLOW
      fontStyle: bold
